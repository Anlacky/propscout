<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PropScout — Búsqueda Inmobiliaria Santiago</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root {
    --bg:        #F7F6F2;
    --surface:   #FFFFFF;
    --navy:      #1B3A57;
    --navy-dim:  #2C5282;
    --green:     #2D7A4F;
    --green-lt:  #E6F4EC;
    --amber:     #C47D1A;
    --amber-lt:  #FEF3DC;
    --red:       #C0392B;
    --border:    #E2E0DA;
    --muted:     #8A8780;
    --text:      #1A1917;
    --text-soft: #4A4845;
    --shadow:    0 2px 12px rgba(27,58,87,0.10);
    --radius:    8px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: var(--navy);
    color: #fff;
    padding: 20px 32px;
    display: flex;
    align-items: center;
    gap: 16px;
    border-bottom: 3px solid var(--green);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
  .logo span { color: #6EC9A0; }
  .tagline { font-size: 12px; color: #A0B8CC; margin-top: 1px; }
  header .uf-badge {
    margin-left: auto;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 6px;
    padding: 6px 12px;
    font-size: 12px;
    color: #CBD5E0;
    text-align: right;
    line-height: 1.5;
  }
  .uf-badge strong { color: #fff; font-size: 14px; }

  /* ── FILTROS ── */
  .panel-filtros {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 20px 32px;
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    align-items: flex-end;
  }
  .campo { display: flex; flex-direction: column; gap: 4px; }
  .campo label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
  .campo input, .campo select {
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 8px 12px;
    font-size: 14px;
    color: var(--text);
    background: var(--bg);
    width: 130px;
    outline: none;
    transition: border-color .15s;
  }
  .campo input:focus, .campo select:focus { border-color: var(--navy); }
  .campo-comunas { display: flex; flex-direction: column; gap: 4px; }
  .campo-comunas label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
  .checks { display: flex; gap: 10px; }
  .check-item { display: flex; align-items: center; gap: 5px; font-size: 13px; cursor: pointer; }
  .check-item input[type=checkbox] { accent-color: var(--navy); width: 15px; height: 15px; }
  .btn-buscar {
    background: var(--navy);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    padding: 10px 24px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background .15s, transform .1s;
    letter-spacing: .2px;
  }
  .btn-buscar:hover { background: var(--navy-dim); }
  .btn-buscar:active { transform: scale(.97); }
  .btn-buscar:disabled { background: var(--muted); cursor: not-allowed; }
  .btn-excel {
    background: var(--green);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    padding: 10px 18px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background .15s;
    display: none;
  }
  .btn-excel:hover { background: #235f3d; }

  /* ── BARRA DE ESTADO ── */
  .barra-estado {
    padding: 12px 32px;
    font-size: 13px;
    color: var(--text-soft);
    display: flex;
    align-items: center;
    gap: 12px;
    min-height: 44px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .pill {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: var(--green-lt);
    color: var(--green);
    border-radius: 20px;
    padding: 2px 10px;
    font-size: 12px;
    font-weight: 600;
  }
  .pill.amber { background: var(--amber-lt); color: var(--amber); }
  .pill.red   { background: #FDECEA; color: var(--red); }
  .sort-row { margin-left: auto; display: flex; align-items: center; gap: 8px; font-size: 12px; }
  .sort-row select {
    border: 1px solid var(--border); border-radius: 5px;
    padding: 4px 8px; font-size: 12px; background: var(--bg); outline: none;
  }

  /* ── PROGRESS ── */
  .progress-wrap {
    padding: 32px;
    display: none;
  }
  .progress-label { font-size: 13px; color: var(--text-soft); margin-bottom: 10px; }
  .progress-bar-bg {
    background: var(--border);
    border-radius: 4px;
    height: 6px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--navy), var(--green));
    border-radius: 4px;
    width: 0%;
    transition: width .4s ease;
  }
  .progress-log {
    margin-top: 12px;
    font-size: 12px;
    color: var(--muted);
    line-height: 1.8;
    max-height: 80px;
    overflow-y: auto;
  }

  /* ── GRID DE TARJETAS ── */
  .contenedor {
    padding: 24px 32px;
    max-width: 1400px;
    margin: 0 auto;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 18px;
  }
  .tarjeta {
    background: var(--surface);
    border-radius: 10px;
    box-shadow: var(--shadow);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    border: 1px solid var(--border);
    transition: box-shadow .15s, transform .15s;
  }
  .tarjeta:hover { box-shadow: 0 6px 24px rgba(27,58,87,0.15); transform: translateY(-2px); }
  .tarjeta-img {
    height: 160px;
    background: linear-gradient(135deg, #1B3A57 0%, #2D7A4F 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
    position: relative;
    overflow: hidden;
  }
  .tarjeta-img img {
    width: 100%; height: 100%; object-fit: cover;
    position: absolute; top: 0; left: 0;
  }
  .fuente-badge {
    position: absolute;
    top: 8px; left: 8px;
    background: rgba(0,0,0,0.55);
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: .5px;
    backdrop-filter: blur(4px);
  }
  .tarjeta-body { padding: 14px 16px; flex: 1; display: flex; flex-direction: column; gap: 6px; }
  .tarjeta-comuna { font-size: 10px; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: .6px; }
  .tarjeta-titulo {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.35;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .tarjeta-precio { font-size: 22px; font-weight: 800; color: var(--navy); margin-top: 2px; }
  .tarjeta-precio-clp { font-size: 11px; color: var(--muted); }
  .tarjeta-specs {
    display: flex;
    gap: 12px;
    font-size: 12px;
    color: var(--text-soft);
    margin-top: 4px;
    flex-wrap: wrap;
  }
  .tarjeta-specs span { display: flex; align-items: center; gap: 3px; }
  .tarjeta-footer { padding: 0 16px 14px; }
  .btn-ver {
    display: block;
    text-align: center;
    background: var(--navy);
    color: #fff;
    padding: 8px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
    text-decoration: none;
    transition: background .15s;
  }
  .btn-ver:hover { background: var(--navy-dim); }

  /* ── EMPTY / ERROR ── */
  .estado-vacio {
    text-align: center;
    padding: 60px 24px;
    color: var(--muted);
  }
  .estado-vacio .icono { font-size: 48px; margin-bottom: 12px; }
  .estado-vacio h3 { font-size: 16px; color: var(--text-soft); margin-bottom: 6px; }
  .estado-vacio p  { font-size: 13px; line-height: 1.6; max-width: 400px; margin: 0 auto; }

  /* ── PAGINACIÓN ── */
  .paginacion { display: flex; justify-content: center; gap: 6px; margin: 24px 0 8px; flex-wrap: wrap; }
  .paginacion button {
    border: 1.5px solid var(--border);
    background: var(--surface);
    color: var(--text);
    border-radius: 6px;
    padding: 6px 12px;
    font-size: 13px;
    cursor: pointer;
    transition: all .1s;
  }
  .paginacion button.activo { background: var(--navy); color: #fff; border-color: var(--navy); }
  .paginacion button:hover:not(.activo):not(:disabled) { border-color: var(--navy); color: var(--navy); }
  .paginacion button:disabled { opacity: .4; cursor: not-allowed; }

  /* ── PORTALES DIRECTOS ── */
  .portales-section {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 20px 32px;
  }
  .portales-section h4 { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 12px; }
  .portales-grid { display: flex; flex-wrap: wrap; gap: 8px; }
  .portal-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    padding: 7px 14px;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-soft);
    text-decoration: none;
    background: var(--bg);
    transition: all .15s;
  }
  .portal-link:hover { border-color: var(--navy); color: var(--navy); background: #EFF4F9; }

  @media (max-width: 600px) {
    header { padding: 14px 16px; }
    .panel-filtros { padding: 16px; gap: 12px; }
    .contenedor { padding: 16px; }
    .barra-estado { padding: 10px 16px; flex-wrap: wrap; }
    .portales-section { padding: 16px; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div>
    <div class="logo">Prop<span>Scout</span></div>
    <div class="tagline">Buscador inmobiliario · Santiago de Chile</div>
  </div>
  <div class="uf-badge" id="ufBadge">
    Cargando UF...<br><strong>—</strong>
  </div>
</header>

<!-- FILTROS -->
<div class="panel-filtros">
  <div class="campo">
    <label>Precio máx. (UF)</label>
    <input type="number" id="precioMax" value="5100" min="1000" max="20000" step="100">
  </div>
  <div class="campo">
    <label>Dorm. mínimos</label>
    <select id="dormMin">
      <option value="1">1+</option>
      <option value="2" selected>2+</option>
      <option value="3">3+</option>
      <option value="4">4+</option>
    </select>
  </div>
  <div class="campo">
    <label>Superficie mín. (m²)</label>
    <input type="number" id="supMin" value="50" min="20" max="200" step="5">
  </div>
  <div class="campo">
    <label>Estacionamiento</label>
    <select id="estacReq">
      <option value="1">Requerido</option>
      <option value="0">Indiferente</option>
    </select>
  </div>
  <div class="campo-comunas">
    <label>Comunas</label>
    <div class="checks">
      <label class="check-item"><input type="checkbox" value="Providencia" checked> Providencia</label>
      <label class="check-item"><input type="checkbox" value="Ñuñoa" checked> Ñuñoa</label>
      <label class="check-item"><input type="checkbox" value="Las Condes" checked> Las Condes</label>
    </div>
  </div>
  <button class="btn-buscar" id="btnBuscar" onclick="iniciarBusqueda()">🔍 Buscar</button>
  <button class="btn-excel" id="btnExcel" onclick="exportarExcel()">⬇ Exportar Excel</button>
</div>

<!-- PROGRESS -->
<div class="progress-wrap" id="progressWrap">
  <div class="progress-label" id="progressLabel">Iniciando búsqueda...</div>
  <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill"></div></div>
  <div class="progress-log" id="progressLog"></div>
</div>

<!-- BARRA DE ESTADO -->
<div class="barra-estado" id="barraEstado" style="display:none">
  <span id="estadoTexto"></span>
  <div class="sort-row">
    Ordenar:
    <select onchange="ordenar(this.value)">
      <option value="precio_asc">Precio ↑</option>
      <option value="precio_desc">Precio ↓</option>
      <option value="sup_desc">Superficie ↓</option>
    </select>
  </div>
</div>

<!-- CONTENIDO PRINCIPAL -->
<div class="contenedor">
  <div id="gridResultados">
    <div class="estado-vacio">
      <div class="icono">🏙️</div>
      <h3>Configura tu búsqueda</h3>
      <p>Ajusta los filtros y presiona <strong>Buscar</strong> para encontrar departamentos en Providencia, Ñuñoa y Las Condes.</p>
    </div>
  </div>
  <div class="paginacion" id="paginacion"></div>
</div>

<!-- PORTALES DIRECTOS -->
<div class="portales-section">
  <h4>Acceso directo a portales</h4>
  <div class="portales-grid" id="portalesGrid"></div>
</div>

<script>
// ══════════════════════════════════════════════════════
// ESTADO GLOBAL
// ══════════════════════════════════════════════════════
const S = {
  resultados: [],
  ufValor: 39200,
  pagina: 0,
  porPagina: 24,
};

// ══════════════════════════════════════════════════════
// UF EN TIEMPO REAL
// ══════════════════════════════════════════════════════
async function cargarUF() {
  const badge = document.getElementById('ufBadge');
  try {
    const hoy = new Date();
    const dd = String(hoy.getDate()).padStart(2,'0');
    const mm = String(hoy.getMonth()+1).padStart(2,'0');
    const yyyy = hoy.getFullYear();
    const r = await fetch(`https://mindicador.cl/api/uf/${dd}-${mm}-${yyyy}`);
    const d = await r.json();
    S.ufValor = d.serie[0].valor;
    badge.innerHTML = `UF hoy (${dd}/${mm}/${yyyy})<br><strong>$${S.ufValor.toLocaleString('es-CL')} CLP</strong>`;
  } catch(e) {
    badge.innerHTML = `UF referencial<br><strong>$${S.ufValor.toLocaleString('es-CL')} CLP</strong>`;
  }
}

// ══════════════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════════════
function logProgress(msg) {
  const el = document.getElementById('progressLog');
  el.innerHTML += msg + '<br>';
  el.scrollTop = el.scrollHeight;
}

function setProgress(pct, label) {
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = label;
}

function getComunasSeleccionadas() {
  return [...document.querySelectorAll('.checks input:checked')].map(c => c.value);
}

function ufACLP(uf) { return Math.round(parseFloat(uf || 0) * S.ufValor); }
function clpAUF(clp) { return Math.round(parseFloat(clp || 0) / S.ufValor * 10) / 10; }

// Proxy CORS para sortear restricciones del navegador
const WORKER_URL = 'https://propscout.alvarez-kamilo.workers.dev';

async function fetchConProxy(url, opciones = {}) {
  // Usa el Cloudflare Worker como proxy para evitar restricciones CORS
  try {
    const proxyUrl = `${WORKER_URL}?url=${encodeURIComponent(url)}`;
    const r = await fetch(proxyUrl, { signal: AbortSignal.timeout(20000) });
    if (r.ok) return r;
  } catch (e) { /* silencioso */ }
  return null;
}

// ══════════════════════════════════════════════════════
// FUENTE 1: MERCADOLIBRE API
// ══════════════════════════════════════════════════════
const COMUNAS_ML_IDS = {
  'Providencia': 'TUCLProvidencia',
  'Ñuñoa':       'TUCLNunoa',
  'Las Condes':  'TUCLLasCondes',
};

async function buscarML(comunas, precioMaxUF, dormMin, supMin, estacReq) {
  const resultados = [];
  const precioMaxCLP = Math.round(precioMaxUF * S.ufValor);

  for (const comuna of comunas) {
    const locId = COMUNAS_ML_IDS[comuna];
    if (!locId) continue;
    logProgress(`  MercadoLibre → ${comuna}...`);

    let offset = 0;
    while (offset < 200) {
      const params = new URLSearchParams({
        category:     'MLC1459',
        neighborhood: locId,
        price:        `0-${precioMaxCLP}`,
        BEDROOMS:     `${dormMin}-*`,
        sort:         'price_asc',
        limit:        '50',
        offset:       String(offset),
      });
      const url = `https://api.mercadolibre.com/sites/MLC/search?${params}`;
      const resp = await fetchConProxy(url);
      if (!resp) break;

      let data;
      try { data = await resp.json(); } catch(e) { break; }

      const items = data.results || [];
      if (!items.length) break;

      for (const item of items) {
        const attrs = {};
        for (const a of (item.attributes || [])) attrs[a.id] = a.value_name || '';

        const precioCLP  = item.price || 0;
        const precioUF   = clpAUF(precioCLP);
        const dorms      = parseInt(attrs.BEDROOMS) || 0;
        const supRaw     = attrs.TOTAL_AREA || attrs.COVERED_AREA || '';
        const sup        = parseFloat(supRaw.replace(/[^\d.]/g,'')) || 0;
        const estacRaw   = attrs.PARKING_LOTS || '0';
        const tieneEstac = !['','0','None','No'].includes(String(estacRaw).trim());

        if (sup > 0 && sup < supMin) continue;
        if (estacReq && !tieneEstac) continue;
        if (dorms > 0 && dorms < dormMin) continue;

        resultados.push({
          fuente: 'MercadoLibre', titulo: item.title || '',
          comuna, precioUF, precioCLP, dormitorios: dorms || '—',
          superficie: sup || '—', estacionamiento: tieneEstac ? (estacRaw || '1') : 'No',
          enlace: item.permalink || '#', thumbnail: item.thumbnail || '',
        });
      }

      const total = data.paging?.total || 0;
      offset += 50;
      if (offset >= Math.min(total, 200)) break;
      await new Promise(r => setTimeout(r, 300));
    }
    logProgress(`    → ${resultados.filter(r => r.fuente==='MercadoLibre' && r.comuna===comuna).length} resultados`);
  }
  return resultados;
}

// ══════════════════════════════════════════════════════
// FUENTE 2: TOCTOC
// ══════════════════════════════════════════════════════
const COMUNAS_TOCTOC_IDS = {
  'Providencia': '27', 'Ñuñoa': '23', 'Las Condes': '16',
};

async function buscarToctoc(comunas, precioMaxUF, dormMin, supMin, estacReq) {
  const resultados = [];
  for (const comuna of comunas) {
    const cid = COMUNAS_TOCTOC_IDS[comuna];
    if (!cid) continue;
    logProgress(`  Toctoc → ${comuna}...`);

    for (let pagina = 1; pagina <= 4; pagina++) {
      const url = `https://www.toctoc.com/api/v2/listings?operation_type=1&property_type=2&commune_id=${cid}&price_to=${precioMaxUF}&price_currency=UF&bedrooms_from=${dormMin}&covered_area_from=${supMin}&page=${pagina}&per_page=30`;
      const resp = await fetchConProxy(url);
      if (!resp) break;

      let data;
      try { data = await resp.json(); } catch(e) { break; }

      const listings = data.listings || data.data || [];
      if (!listings.length) break;

      for (const p of listings) {
        const precioUF  = parseFloat(p.price_uf || p.price || 0);
        const sup       = parseFloat(p.covered_area || p.built_area || 0);
        const dorms     = parseInt(p.bedrooms || 0);
        const estac     = parseInt(p.parking_spaces || p.parkings || 0);
        const slug      = p.slug || p.id || '';

        if (estacReq && estac < 1) continue;

        resultados.push({
          fuente: 'Toctoc', titulo: p.title || p.address || 'Departamento en venta',
          comuna, precioUF, precioCLP: ufACLP(precioUF),
          dormitorios: dorms || '—', superficie: sup || '—',
          estacionamiento: estac > 0 ? String(estac) : 'No',
          enlace: slug ? `https://www.toctoc.com/propiedades/${slug}` : 'https://www.toctoc.com',
          thumbnail: p.main_image || p.thumbnail || '',
        });
      }
      await new Promise(r => setTimeout(r, 500));
    }
    logProgress(`    → ${resultados.filter(r => r.fuente==='Toctoc' && r.comuna===comuna).length} resultados`);
  }
  return resultados;
}

// ══════════════════════════════════════════════════════
// FUENTE 3: PORTAL INMOBILIARIO
// ══════════════════════════════════════════════════════
const COMUNAS_PI_SLUG = {
  'Providencia': 'providencia', 'Ñuñoa': 'nunoa', 'Las Condes': 'las-condes',
};

async function buscarPortalInmobiliario(comunas, precioMaxUF, dormMin, supMin, estacReq) {
  const resultados = [];
  for (const comuna of comunas) {
    const slug = COMUNAS_PI_SLUG[comuna];
    if (!slug) continue;
    logProgress(`  Portal Inmobiliario → ${comuna}...`);

    const url = `https://api.portalinmobiliario.com/pi/v1/properties/search?propertyType=APARTMENT&operationType=SELL&location=${slug}&priceMaxUF=${precioMaxUF}&bedroomsMin=${dormMin}&coveredAreaMin=${supMin}&parkingSpacesMin=${estacReq?'1':'0'}&limit=48&offset=0&sort=PRICE_ASC`;
    const resp = await fetchConProxy(url);
    if (resp) {
      try {
        const data = await resp.json();
        const props = data.properties || data.results || [];
        for (const p of props) {
          const precio   = p.price || {};
          const precioUF = parseFloat(precio.uf || precio.amount || 0);
          const attrMap  = {};
          for (const a of (p.attributes || [])) attrMap[a.id] = a.value;
          const sup  = parseFloat(attrMap.coveredArea || attrMap.totalArea || p.coveredArea || 0);
          const dorms= parseInt(attrMap.bedrooms || p.bedrooms || 0);
          const estac= parseInt(attrMap.parkingSpaces || p.parkingSpaces || 0);

          resultados.push({
            fuente: 'Portal Inmobiliario', titulo: p.title || 'Departamento en venta',
            comuna, precioUF, precioCLP: ufACLP(precioUF),
            dormitorios: dorms || '—', superficie: sup || '—',
            estacionamiento: estac > 0 ? String(estac) : 'No',
            enlace: p.url || 'https://www.portalinmobiliario.com',
            thumbnail: p.thumbnail || '',
          });
        }
      } catch(e) { /* silencioso */ }
    }
    logProgress(`    → ${resultados.filter(r => r.fuente==='Portal Inmobiliario' && r.comuna===comuna).length} resultados`);
    await new Promise(r => setTimeout(r, 500));
  }
  return resultados;
}

// ══════════════════════════════════════════════════════
// ORQUESTADOR PRINCIPAL
// ══════════════════════════════════════════════════════
async function iniciarBusqueda() {
  const comunas   = getComunasSeleccionadas();
  const precioMax = parseFloat(document.getElementById('precioMax').value) || 5100;
  const dormMin   = parseInt(document.getElementById('dormMin').value)      || 2;
  const supMin    = parseFloat(document.getElementById('supMin').value)     || 50;
  const estacReq  = document.getElementById('estacReq').value === '1';

  if (!comunas.length) { alert('Selecciona al menos una comuna.'); return; }

  // UI: inicio
  document.getElementById('btnBuscar').disabled = true;
  document.getElementById('btnExcel').style.display = 'none';
  document.getElementById('barraEstado').style.display = 'none';
  document.getElementById('progressWrap').style.display = 'block';
  document.getElementById('progressLog').innerHTML = '';
  document.getElementById('gridResultados').innerHTML = '';
  document.getElementById('paginacion').innerHTML = '';
  S.resultados = [];
  S.pagina = 0;

  setProgress(5, 'Consultando MercadoLibre...');
  const r1 = await buscarML(comunas, precioMax, dormMin, supMin, estacReq);

  setProgress(40, 'Consultando Toctoc...');
  const r2 = await buscarToctoc(comunas, precioMax, dormMin, supMin, estacReq);

  setProgress(70, 'Consultando Portal Inmobiliario...');
  const r3 = await buscarPortalInmobiliario(comunas, precioMax, dormMin, supMin, estacReq);

  setProgress(90, 'Consolidando resultados...');

  // Consolidar y deduplicar por enlace
  const todos = [...r1, ...r2, ...r3];
  const vistos = new Set();
  S.resultados = todos.filter(p => {
    if (vistos.has(p.enlace)) return false;
    vistos.add(p.enlace);
    return true;
  }).sort((a, b) => a.precioUF - b.precioUF);

  setProgress(100, `${S.resultados.length} propiedades encontradas`);

  await new Promise(r => setTimeout(r, 400));
  document.getElementById('progressWrap').style.display = 'none';
  document.getElementById('btnBuscar').disabled = false;

  if (S.resultados.length > 0) {
    document.getElementById('btnExcel').style.display = '';
    document.getElementById('barraEstado').style.display = 'flex';
  }

  renderEstado();
  renderGrid();
}

// ══════════════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════════════
function renderEstado() {
  const total  = S.resultados.length;
  const desde  = S.pagina * S.porPagina + 1;
  const hasta  = Math.min(desde + S.porPagina - 1, total);
  const fuentes = [...new Set(S.resultados.map(r => r.fuente))];

  document.getElementById('estadoTexto').innerHTML = total === 0
    ? '<span class="pill red">Sin resultados</span> Prueba ajustando los filtros.'
    : `<span class="pill">${total} propiedades</span> Mostrando ${desde}–${hasta} · Fuentes: ${fuentes.join(', ')}`;
}

function renderGrid() {
  const grid = document.getElementById('gridResultados');
  const inicio = S.pagina * S.porPagina;
  const pagina = S.resultados.slice(inicio, inicio + S.porPagina);

  if (!pagina.length) {
    grid.innerHTML = `
      <div class="estado-vacio">
        <div class="icono">🔍</div>
        <h3>Sin resultados para estos filtros</h3>
        <p>Intenta aumentar el precio máximo, reducir la superficie mínima o desmarcar el requisito de estacionamiento.</p>
      </div>`;
    document.getElementById('paginacion').innerHTML = '';
    return;
  }

  grid.innerHTML = `<div class="grid">${pagina.map(tarjetaHTML).join('')}</div>`;
  renderPaginacion();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function tarjetaHTML(p) {
  const imgTag = p.thumbnail
    ? `<img src="${p.thumbnail}" alt="" loading="lazy" onerror="this.style.display='none'">`
    : '';
  const precioFmt = p.precioUF ? `${Number(p.precioUF).toLocaleString('es-CL', {minimumFractionDigits:0})} UF` : '—';
  const clpFmt    = p.precioCLP ? `$${Number(p.precioCLP).toLocaleString('es-CL')} CLP` : '';
  const estacIcon = (p.estacionamiento && p.estacionamiento !== 'No') ? '🚗 Sí' : '🚗 No';

  return `
    <div class="tarjeta">
      <div class="tarjeta-img">
        ${imgTag}
        <span class="fuente-badge">${p.fuente}</span>
      </div>
      <div class="tarjeta-body">
        <div class="tarjeta-comuna">${p.comuna}</div>
        <div class="tarjeta-titulo">${p.titulo}</div>
        <div class="tarjeta-precio">${precioFmt}</div>
        <div class="tarjeta-precio-clp">${clpFmt}</div>
        <div class="tarjeta-specs">
          <span>🛏 ${p.dormitorios} dorm.</span>
          <span>📐 ${p.superficie !== '—' ? p.superficie + ' m²' : '—'}</span>
          <span>${estacIcon}</span>
        </div>
      </div>
      <div class="tarjeta-footer">
        <a class="btn-ver" href="${p.enlace}" target="_blank" rel="noopener">Ver propiedad →</a>
      </div>
    </div>`;
}

function renderPaginacion() {
  const total = Math.ceil(S.resultados.length / S.porPagina);
  if (total <= 1) { document.getElementById('paginacion').innerHTML = ''; return; }

  let html = `<button onclick="irPagina(${S.pagina-1})" ${S.pagina===0?'disabled':''}>← Anterior</button>`;
  for (let i = 0; i < total; i++) {
    if (i === 0 || i === total-1 || Math.abs(i - S.pagina) <= 1) {
      html += `<button class="${i===S.pagina?'activo':''}" onclick="irPagina(${i})">${i+1}</button>`;
    } else if (Math.abs(i - S.pagina) === 2) {
      html += `<button disabled>…</button>`;
    }
  }
  html += `<button onclick="irPagina(${S.pagina+1})" ${S.pagina>=total-1?'disabled':''}>Siguiente →</button>`;
  document.getElementById('paginacion').innerHTML = html;
}

function irPagina(n) {
  const total = Math.ceil(S.resultados.length / S.porPagina);
  if (n < 0 || n >= total) return;
  S.pagina = n;
  renderEstado();
  renderGrid();
}

function ordenar(criterio) {
  if (criterio === 'precio_asc')  S.resultados.sort((a,b) => a.precioUF - b.precioUF);
  if (criterio === 'precio_desc') S.resultados.sort((a,b) => b.precioUF - a.precioUF);
  if (criterio === 'sup_desc')    S.resultados.sort((a,b) => (parseFloat(b.superficie)||0) - (parseFloat(a.superficie)||0));
  S.pagina = 0;
  renderGrid();
}

// ══════════════════════════════════════════════════════
// EXPORTAR EXCEL
// ══════════════════════════════════════════════════════
function exportarExcel() {
  if (!S.resultados.length) return;

  const filas = S.resultados.map(p => ({
    'Fuente':           p.fuente,
    'Título':           p.titulo,
    'Comuna':           p.comuna,
    'Precio (UF)':      p.precioUF,
    'Precio (CLP)':     p.precioCLP,
    'Dormitorios':      p.dormitorios,
    'Superficie (m²)':  p.superficie,
    'Estacionamiento':  p.estacionamiento,
    'Enlace':           p.enlace,
    'Fecha extracción': new Date().toLocaleString('es-CL'),
  }));

  const wb   = XLSX.utils.book_new();
  const ws   = XLSX.utils.json_to_sheet(filas);

  // Ancho de columnas
  ws['!cols'] = [
    {wch:18},{wch:50},{wch:14},{wch:12},{wch:18},
    {wch:13},{wch:15},{wch:15},{wch:55},{wch:18}
  ];

  XLSX.utils.book_append_sheet(wb, ws, 'Resultados');

  // Hoja resumen
  const resumen = {};
  for (const p of S.resultados) {
    const k = `${p.fuente} · ${p.comuna}`;
    if (!resumen[k]) resumen[k] = { count: 0, precios: [] };
    resumen[k].count++;
    if (p.precioUF) resumen[k].precios.push(p.precioUF);
  }
  const filasRes = Object.entries(resumen).map(([k,v]) => ({
    'Fuente · Comuna': k,
    'N° Propiedades':  v.count,
    'Precio Mín (UF)': v.precios.length ? Math.min(...v.precios) : '—',
    'Precio Máx (UF)': v.precios.length ? Math.max(...v.precios) : '—',
    'Precio Prom (UF)': v.precios.length ? Math.round(v.precios.reduce((a,b)=>a+b,0)/v.precios.length * 10)/10 : '—',
  }));
  const ws2 = XLSX.utils.json_to_sheet(filasRes);
  ws2['!cols'] = [{wch:30},{wch:16},{wch:16},{wch:16},{wch:17}];
  XLSX.utils.book_append_sheet(wb, ws2, 'Resumen');

  const fecha = new Date().toISOString().slice(0,16).replace('T','_').replace(':','');
  XLSX.writeFile(wb, `PropScout_${fecha}.xlsx`);
}
